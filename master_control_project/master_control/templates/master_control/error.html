{% extends "master_control/base.html" %}
{% block title %}{{ code }} Error{% endblock %}
{% block breadcrumb %}Error {{ code }}{% endblock %}
{% block content %}
<div class="page" style="display:flex;align-items:center;justify-content:center;min-height:60vh">
  <div style="text-align:center;max-width:420px">
    <div style="font-size:80px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;
                color:#dde3ee;line-height:1;margin-bottom:20px">{{ code }}</div>
    <div style="font-family:'Plus Jakarta Sans',sans-serif;font-size:20px;font-weight:700;
                color:#0f1c30;margin-bottom:10px">{{ message }}</div>
    <div style="font-size:13.5px;color:#8a97aa;margin-bottom:28px;line-height:1.7">
      {{ detail or "Something went wrong. Please try again." }}
    </div>
    <a href="/admin/dashboard" class="btn btn-primary">
      <i class="fas fa-house"></i> Back to Dashboard
    </a>
  </div>
</div>
{% endblock %}
