<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admission System{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #007bff;
            --primary-dark: #0056b3;
            --primary-light: #e8f2ff;
            --bg: #f0f4f8;
            --card: #ffffff;
            --border: #cce0ff;
            --text: #1a2340;
            --muted: #6b7a99;
        }

        body {
            background: var(--bg);
            font-family: 'Inter', sans-serif;
            color: var(--text);
            min-height: 100vh;
        }

        .navbar {
            background: linear-gradient(90deg, #004fa3, #007bff);
            box-shadow: 0 2px 10px rgba(0,123,255,0.1);
        }

        .navbar-brand {
            font-weight: 600;
            font-size: 1.2rem;
        }

        .main-container {
            padding: 0rem;
        }

        .page-header {
            background: var(--card);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 20px rgba(0,123,255,0.08);
            border: 1px solid var(--border);
        }

        .page-title {
            color: var(--primary-dark);
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .page-subtitle {
            color: var(--muted);
            margin-bottom: 0;
        }

        .card {
            border: 1px solid var(--border);
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0,123,255,0.07);
        }

        .btn-primary {
            background: linear-gradient(90deg, #004fa3, #007bff);
            border: none;
            font-weight: 600;
        }

        .btn-primary:hover {
            background: linear-gradient(90deg, #0056b3, #0086ff);
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(0,123,255,0.3);
        }

        .table {
            border-radius: 8px;
            overflow: hidden;
        }

        .table thead th {
            background: linear-gradient(90deg, #004fa3, #007bff);
            color: white;
            border: none;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        .stats-card {
            background: var(--card);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 1.5rem;
            text-align: center;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .stats-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,123,255,0.12);
        }

        .stats-number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-dark);
        }

        .stats-label {
            color: var(--muted);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .alert {
            border: none;
            border-radius: 8px;
            padding: 1rem 1.25rem;
            margin-bottom: 1.5rem;
            font-weight: 500;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .alert-success {
            background: linear-gradient(135deg, #d4edda, #c3e6cb);
            color: #155724;
            border-left: 4px solid #28a745;
        }

        .alert-error, .alert-danger {
            background: linear-gradient(135deg, #f8d7da, #f5c6cb);
            color: #721c24;
            border-left: 4px solid #dc3545;
        }

        .alert-warning {
            background: linear-gradient(135deg, #fff3cd, #ffeeba);
            color: #856404;
            border-left: 4px solid #ffc107;
        }

        .alert-info {
            background: linear-gradient(135deg, #d1ecf1, #bee5eb);
            color: #0c5460;
            border-left: 4px solid #17a2b8;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0,123,255,0.14);
        }
    </style>
</head>
<body>
<!-- Unified Header -->
<div class="container-fluid" style="background: #fff; border-bottom: 2px solid #007bff; padding: 0;">
    <div class="container-fluid">
        <div class="row align-items-center">
            <!-- University Logo and Info -->
            <div class="col-md-6 col-sm-6 col-xs-12">
                <div class="d-flex align-items-center py-2">
                    <div class="me-3">
                        <img src="https://d2f8si4msg5dzg.cloudfront.net/images/cblu.png" style="height:50px; width:55px;" alt="CBLU Logo">
                    </div>
                    <div>
                        <p style="color:#391DA1;font-size:large;font-weight:bold;margin: 0px 0px 2px 0px;">
                            CHAUDHARY BANSI LAL UNIVERSITY
                        </p>
                        <p style="color:#666;font-size:small;margin: 0px 0px 2px 0px;">
                            Bhiwani-127021, Haryana(INDIA)
                        </p>
                        <p style="color:#08A847;font-size:x-small;font-weight:bold;margin: 0px;">
                            (A State University established under Haryana Act No. 25 of 2014)
                        </p>
                    </div>
                </div>
            </div>
            
            <!-- Navigation -->
            <div class="col-md-6 col-sm-6 col-xs-12">
                <div class="d-flex align-items-center justify-content-end py-2" style="background: #fff; height: 100%;">
                    <div class="d-flex align-items-center">
                        <a href="{% url 'home' %}" class="btn text-black me-2" style="background: transparent; border: none; font-weight: 500;">
                            <i class="fas fa-home"></i> Home
                        </a>
                        {% if user.is_authenticated %}
                            <a href="{% url 'dashboard' %}" class="btn text-black me-2" style="background: transparent; border: none; font-weight: 500;">
                                <i class="fas fa-tachometer-alt"></i> Dashboard
                            </a>
                            <div class="dropdown">
                                <a class="btn text-black dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" style="background: transparent; border: none; font-weight: 500;">
                                    <i class="fas fa-user"></i> {{ user.username }}
                                </a>
                                <ul class="dropdown-menu">
                                    <li><a class="dropdown-item" href="{% url 'logout' %}"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
                                </ul>
                            </div>
                        {% else %}
                            <a href="{% url 'login' %}" class="btn text-balck me-2" style="background: transparent; border: none; font-weight: 500;">
                                <i class="fas fa-sign-in-alt"></i> Login
                            </a>
                            <a href="{% url 'register' %}" class="btn text-black" style="background: transparent; border: none; font-weight: 500;">
                                <i class="fas fa-user-plus"></i> Register
                            </a>
                        {% endif %}
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

    <div class="container main-container">
        <!-- {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %} -->

        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
