<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PhD Admission System{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #007bff;
            --primary-dark: #0056b3;
            --primary-light: #e8f2ff;
            --bg: #f0f4f8;
            --card: #ffffff;
            --border: #cce0ff;
            --text: #1a2340;
            --muted: #6b7a99;
        }

        body {
            background: var(--bg);
            font-family: 'Inter', sans-serif;
            color: var(--text);
            min-height: 100vh;
        }

        .navbar {
            background: linear-gradient(90deg, #004fa3, #007bff);
            box-shadow: 0 2px 10px rgba(0,123,255,0.1);
        }

        .navbar-brand {
            font-weight: 600;
            font-size: 1.2rem;
        }

        .main-container {
            padding: 2rem;
        }

        .page-header {
            background: var(--card);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 20px rgba(0,123,255,0.08);
            border: 1px solid var(--border);
        }

        .page-title {
            color: var(--primary-dark);
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .page-subtitle {
            color: var(--muted);
            margin-bottom: 0;
        }

        .card {
            border: 1px solid var(--border);
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0,123,255,0.07);
        }

        .btn-primary {
            background: linear-gradient(90deg, #004fa3, #007bff);
            border: none;
            font-weight: 600;
        }

        .btn-primary:hover {
            background: linear-gradient(90deg, #0056b3, #0086ff);
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(0,123,255,0.3);
        }

        .table {
            border-radius: 8px;
            overflow: hidden;
        }

        .table thead th {
            background: linear-gradient(90deg, #004fa3, #007bff);
            color: white;
            border: none;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        .stats-card {
            background: var(--card);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 1.5rem;
            text-align: center;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .stats-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,123,255,0.12);
        }

        .stats-number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-dark);
        }

        .stats-label {
            color: var(--muted);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .alert {
            border: none;
            border-radius: 8px;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0,123,255,0.14);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'employment_details:employment_list' %}">
                🎓 PhD Admission System
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'employment_details:employment_list' %}">
                            💼 Employment Details
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'phd_academic_qualifications:qualification_list' %}">
                            📚 Academic Qualifications
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/">
                            ⚙️ Admin
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container main-container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
